<script>
// 인앱 브라우저 감지 → 외부 브라우저로 이동
// 카카오톡, 에브리타임, 인스타그램, 페이스북, 네이버, 밴드 등
(function() {
  var ua = navigator.userAgent.toLowerCase();
  var target = location.href;
  // 카카오톡 인앱
  if (ua.match(/kakaotalk/i)) {
    location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(target);
    return;
  }
  // 네이버 앱
  if (ua.match(/naver/i) && ua.match(/inapp/i)) {
    // iOS는 intent 스킴을 무시하므로 외부 브라우저 안내만 가능
    if (/iphone|ipad|ipod/i.test(ua)) {
      alert('원활한 이용을 위해 Safari에서 열어주세요.\n\n하단 또는 우측 메뉴 → "Safari로 열기"를 눌러주세요.');
    } else {
      location.href = 'intent://' + target.replace(/https?:\/\//i, '') +
        '#Intent;scheme=https;package=com.android.chrome;end';
    }
    return;
  }
  // 에브리타임, 인스타그램, 페이스북, 밴드, 기타 인앱 WebView
  if (ua.match(/everytime|instagram|fbav|fb_iab|band\/|lineapp|twitter/i)) {
    // iOS: Safari로 열기 시도
    if (/iphone|ipad|ipod/i.test(ua)) {
      // 딥링크 방식은 제한적이므로 안내 알림
      alert('원활한 이용을 위해 Safari 또는 Chrome에서 열어주세요.\n\n우측 상단 ⋯ 메뉴 → "기본 브라우저로 열기"를 눌러주세요.');
    } else {
      // Android: Chrome intent
      location.href = 'intent://' + target.replace(/https?:\/\//i, '') +
        '#Intent;scheme=https;package=com.android.chrome;end';
    }
  }
})();
</script>
